name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall app.py database.py init_db.py import_schedule.py schedule_import.py

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/root/soft_blue_planner_crud' }}
      SERVICE_NAME: ${{ secrets.SERVICE_NAME || 'soft-blue-planner' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Build release archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='env' \
            --exclude='__pycache__' \
            --exclude='.codex_deps' \
            --exclude='planner.db' \
            --exclude='*.tar.gz' \
            -czf /tmp/soft-blue-planner-release.tar.gz .

      - name: Upload release archive
        run: |
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/soft-blue-planner-release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/tmp/soft-blue-planner-release.tar.gz"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' SERVICE_NAME='$SERVICE_NAME' bash -s" < deploy/remote-deploy.sh

      - name: Health check
        run: |
          curl --fail --silent --show-error --location https://shpull.ru/ > /dev/null
          curl --fail --silent --show-error https://shpull.ru/health > /dev/null
